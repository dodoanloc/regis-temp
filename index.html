<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký thông tin khách hàng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .info-text {
            text-align: center;
            color: #888;
            margin-top: 20px;
            font-size: 13px;
        }
        
        .icon {
            text-align: center;
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        .privacy-notice {
            background: #f8f9ff;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #666;
            border-left: 4px solid #667eea;
        }
        
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        .admin-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }
        
        .admin-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📝</div>
        <h1>Đăng ký thông tin</h1>
        
        <div id="message" class="message"></div>
        
        <div class="privacy-notice">
            🔒 Thông tin của bạn sẽ được bảo mật và chỉ sử dụng cho mục đích liên hệ.
        </div>
        
        <form id="registrationForm">
            <div class="form-group">
                <label for="account_number">Số tài khoản *</label>
                <input 
                    type="text" 
                    id="account_number" 
                    name="account_number" 
                    placeholder="Nhập số tài khoản" 
                    required
                    pattern="[0-9]+"
                    title="Vui lòng chỉ nhập số"
                >
            </div>
            
            <div class="form-group">
                <label for="phone">Số điện thoại *</label>
                <input 
                    type="tel" 
                    id="phone" 
                    name="phone" 
                    placeholder="Nhập số điện thoại" 
                    required
                    pattern="[0-9]{10,11}"
                    title="Số điện thoại phải có 10-11 số"
                >
            </div>
            
            <div class="form-group">
                <label for="customer_name">Tên khách hàng *</label>
                <input 
                    type="text" 
                    id="customer_name" 
                    name="customer_name" 
                    placeholder="Nhập tên khách hàng" 
                    required
                >
            </div>
            
            <button type="submit" id="submitBtn">Đăng ký ngay</button>
        </form>
        
        <p class="info-text">* Các trường bắt buộc phải điền</p>
        
        <a href="admin.html" class="admin-link">🔐 Quản lý dữ liệu</a>
    </div>
    
    <script>
        // Airtable Configuration
        const AIRTABLE_CONFIG = {
            apiKey: 'patnWGs6JwKmhOfNX.23903394b7357442b9ed396470a06d3ad920a6727441fd312de9b62e55df8c91',
            baseId: 'appUPT733iVxTAc76',
            tableId: 'tblxjz7JExG5Aob2E',  // Using Table ID instead of name
            tableName: 'Customers'
        };
        
        // Form submission handler
        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const messageDiv = document.getElementById('message');
            
            // Validate baseId is configured
            if (!AIRTABLE_CONFIG.baseId) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '⚠️ Vui lòng cấu hình Base ID trong mã nguồn. Xem hướng dẫn trong README.md';
                return;
            }
            
            // Disable button
            submitBtn.disabled = true;
            submitBtn.textContent = 'Đang xử lý...';
            
            // Get form data
            const formData = {
                fields: {
                    'Số tài khoản': document.getElementById('account_number').value,
                    'Số điện thoại': document.getElementById('phone').value,
                    'Tên khách hàng': document.getElementById('customer_name').value,
                    'Ngày đăng ký': new Date().toISOString()
                }
            };
            
            try {
                // Submit to Airtable using Table ID
                const response = await fetch(`https://api.airtable.com/v0/${AIRTABLE_CONFIG.baseId}/${AIRTABLE_CONFIG.tableId}`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${AIRTABLE_CONFIG.apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                if (response.ok) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = '✅ Đăng ký thành công! Thông tin đã được lưu.';
                    document.getElementById('registrationForm').reset();
                    
                    // Redirect to thank you page after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'thank-you.html';
                    }, 2000);
                } else {
                    const errorData = await response.json();
                    console.error('Airtable error:', errorData);
                    
                    // Show specific error message
                    let errorMsg = 'Lỗi kết nối';
                    if (errorData.error) {
                        if (errorData.error.type === 'INVALID_PERMISSIONS') {
                            errorMsg = 'Token không có quyền ghi dữ liệu. Vui lòng kiểm tra lại quyền của token.';
                        } else if (errorData.error.type === 'NOT_FOUND') {
                            errorMsg = 'Không tìm thấy table. Vui lòng kiểm tra tên table hoặc Base ID.';
                        } else {
                            errorMsg = errorData.error.message || 'Lỗi không xác định';
                        }
                    }
                    throw new Error(errorMsg);
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = '❌ ' + error.message;
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Đăng ký ngay';
            }
        });
    </script>
</body>
</html>
