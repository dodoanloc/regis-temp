<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý dữ liệu khách hàng</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            color: #666;
            margin-top: 5px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
        }
        
        table {
            width: 100%;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-collapse: collapse;
        }
        
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }
        
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
        }
        
        tr:hover {
            background: #f8f9ff;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: transform 0.3s ease;
        }
        
        .back-link:hover {
            transform: translateY(-2px);
        }
        
        .refresh-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        
        .refresh-btn:hover {
            background: #45a049;
        }
        
        .config-box {
            background: #fff3cd;
            border: 1px solid #ffc107;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .config-box code {
            background: #f4f4f4;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Quản lý dữ liệu khách hàng</h1>
        
        <div id="configMessage" class="config-box" style="display: none;">
            ⚠️ <strong>Chưa cấu hình Base ID!</strong><br>
            Vui lòng cập nhật <code>baseId</code> trong file <code>admin.html</code>.
            Xem hướng dẫn trong <a href="README.md">README.md</a>.
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalCount">-</div>
                <div class="stat-label">Tổng số khách hàng</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="todayCount">-</div>
                <div class="stat-label">Đăng ký hôm nay</div>
            </div>
        </div>
        
        <button class="refresh-btn" onclick="loadData()">🔄 Làm mới dữ liệu</button>
        
        <div id="loading" class="loading">Đang tải dữ liệu...⏳</div>
        <div id="error" class="error" style="display: none;"></div>
        
        <div id="tableContainer" style="display: none;">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Số tài khoản</th>
                        <th>Số điện thoại</th>
                        <th>Tên khách hàng</th>
                        <th>Ngày đăng ký</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
        
        <a href="index.html" class="back-link">← Quay lại trang đăng ký</a>
    </div>
    
    <script>
        // Airtable Configuration - MUST match index.html
        const AIRTABLE_CONFIG = {
            apiKey: 'patnWGs6JwKmhOfNX.23903394b7357442b9ed396470a06d3ad920a6727441fd312de9b62e55df8c91',
            baseId: 'appUPT733iVxTAc76',
            tableName: 'Customers'
        };
        
        async function loadData() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const tableContainer = document.getElementById('tableContainer');
            const configMessage = document.getElementById('configMessage');
            
            // Check if baseId is configured
            if (!AIRTABLE_CONFIG.baseId) {
                configMessage.style.display = 'block';
                loading.style.display = 'none';
                return;
            }
            
            configMessage.style.display = 'none';
            loading.style.display = 'block';
            error.style.display = 'none';
            tableContainer.style.display = 'none';
            
            try {
                const response = await fetch(
                    `https://api.airtable.com/v0/${AIRTABLE_CONFIG.baseId}/${AIRTABLE_CONFIG.tableName}?sort[0][field]=Ngày đăng ký&sort[0][direction]=desc`,
                    {
                        headers: {
                            'Authorization': `Bearer ${AIRTABLE_CONFIG.apiKey}`
                        }
                    }
                );
                
                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error?.message || 'Không thể tải dữ liệu');
                }
                
                const data = await response.json();
                
                // Update stats
                document.getElementById('totalCount').textContent = data.records.length;
                
                // Count today's registrations
                const today = new Date().toDateString();
                const todayCount = data.records.filter(r => {
                    const date = new Date(r.fields['Ngày đăng ký']);
                    return date.toDateString() === today;
                }).length;
                document.getElementById('todayCount').textContent = todayCount;
                
                // Populate table
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = '';
                
                if (data.records.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="no-data">Chưa có dữ liệu</td></tr>';
                } else {
                    data.records.forEach(record => {
                        const fields = record.fields;
                        const date = fields['Ngày đăng ký'] 
                            ? new Date(fields['Ngày đăng ký']).toLocaleString('vi-VN')
                            : 'N/A';
                        
                        tbody.innerHTML += `
                            <tr>
                                <td>${record.id.slice(0, 10)}...</td>
                                <td>${fields['Số tài khoản'] || 'N/A'}</td>
                                <td>${fields['Số điện thoại'] || 'N/A'}</td>
                                <td>${fields['Tên khách hàng'] || 'N/A'}</td>
                                <td>${date}</td>
                            </tr>
                        `;
                    });
                }
                
                tableContainer.style.display = 'block';
                
            } catch (err) {
                error.textContent = '❌ ' + err.message;
                error.style.display = 'block';
                console.error('Error:', err);
            } finally {
                loading.style.display = 'none';
            }
        }
        
        // Load data on page load
        loadData();
    </script>
</body>
</html>
