<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý dữ liệu khách hàng - Agribank</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        /* Giữ nguyên CSS cũ của bạn và thêm phần dưới đây */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f7fa; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        h1 { text-align: center; color: #333; margin-bottom: 30px; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        .stat-number { font-size: 28px; font-weight: bold; color: #667eea; }
        
        .filter-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; }
        .filter-group { display: flex; align-items: center; gap: 10px; }
        select, input[type="date"] { padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }

        table { width: 100%; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        tr:hover { background: #f8f9ff; }

        /* Pagination Styles */
        .pagination { display: flex; justify-content: center; gap: 5px; margin-top: 20px; flex-wrap: wrap; }
        .page-btn { padding: 8px 12px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .page-btn.active { background: #667eea; color: white; border-color: #667eea; }
        .page-btn:disabled { cursor: not-allowed; opacity: 0.5; }

        .btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none; font-weight: 600; color: white; transition: 0.3s; }
        .btn-refresh { background: #4CAF50; }
        .btn-export { background: #2196F3; }
        .btn-reset { background: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Quản lý dữ liệu khách hàng</h1>
        
        <div class="stats">
            <div class="stat-card"><div class="stat-number" id="totalCount">-</div><div class="stat-label">Tổng số hệ thống</div></div>
            <div class="stat-card"><div class="stat-number" id="filteredCount">-</div><div class="stat-label">Đang hiển thị</div></div>
            <div class="stat-card"><div class="stat-number" id="todayCount">-</div><div class="stat-label">Mới hôm nay</div></div>
        </div>

        <div class="filter-box">
            <div class="filter-group">
                <label>👤 Cán bộ:</label>
                <select id="staffFilter" onchange="handleFilterChange()">
                    <option value="">-- Tất cả cán bộ --</option>
                    <option value="Đàm Thị Thu Phương">Đàm Thị Thu Phương</option>
                    <option value="Đặng Thị Hảo">Đặng Thị Hảo</option>
                    <option value="Đỗ Doãn Lộc">Đỗ Doãn Lộc</option>
                    <option value="Đỗ Quang Huy">Đỗ Quang Huy</option>
                    <option value="Đỗ Thị Ngọc Anh">Đỗ Thị Ngọc Anh</option>
                    <option value="Đỗ Thị Trang">Đỗ Thị Trang</option>
                    <option value="Đỗ Tuấn Anh">Đỗ Tuấn Anh</option>
                    <option value="Đỗ Tuấn Minh">Đỗ Tuấn Minh</option>
                    <option value="Đỗ Văn Nam">Đỗ Văn Nam</option>
                    <option value="Doãn Thị Dịu">Doãn Thị Dịu</option>
                    <option value="Hà Sĩ Dũng">Hà Sĩ Dũng</option>
                    <option value="Hoàng Thị Lê">Hoàng Thị Lê</option>
                    <option value="Hoàng Thị Minh">Hoàng Thị Minh</option>
                    <option value="Lê Nam Phương">Lê Nam Phương</option>
                    <option value="Lê Thanh Xuân">Lê Thanh Xuân</option>
                    <option value="Lê Thị Diễm Quỳnh">Lê Thị Diễm Quỳnh</option>
                    <option value="Lê Thị Giang">Lê Thị Giang</option>
                    <option value="Lê Thị Nga">Lê Thị Nga</option>
                    <option value="Lê Thị Oanh">Lê Thị Oanh</option>
                    <option value="Lê Thị Uyên">Lê Thị Uyên</option>
                    <option value="Lê Thu Phương">Lê Thu Phương</option>
                    <option value="Lê Xuân Quý">Lê Xuân Quý</option>
                    <option value="Lý Thị Ngọc Mai">Lý Thị Ngọc Mai</option>
                    <option value="Mai Thị Huyền">Mai Thị Huyền</option>
                    <option value="Mai Thị Lan Anh">Mai Thị Lan Anh</option>
                    <option value="Nguyễn Chí Thanh">Nguyễn Chí Thanh</option>
                    <option value="Nguyễn Diệu Linh">Nguyễn Diệu Linh</option>
                    <option value="Nguyễn Ngọc Tú">Nguyễn Ngọc Tú</option>
                    <option value="Nguyễn Quốc Vương Linh">Nguyễn Quốc Vương Linh</option>
                    <option value="Nguyễn Thị Hạnh">Nguyễn Thị Hạnh</option>
                    <option value="Nguyễn Thị Hòa">Nguyễn Thị Hòa</option>
                    <option value="Nguyễn Thị Như Quỳnh">Nguyễn Thị Như Quỳnh</option>
                    <option value="Nguyễn Thị Quyên">Nguyễn Thị Quyên</option>
                    <option value="Nguyễn Trịnh Phương Thảo">Nguyễn Trịnh Phương Thảo</option>
                    <option value="Nguyễn Văn Sơn">Nguyễn Văn Sơn</option>
                    <option value="Phạm Văn Khoa">Phạm Văn Khoa</option>
                    <option value="Phùng Lê Diệu Linh">Phùng Lê Diệu Linh</option>
                    <option value="Trần Thị Hồ Lan">Trần Thị Hồ Lan</option>
                    <option value="Trịnh Ngọc Nam">Trịnh Ngọc Nam</option>
                    <option value="Trịnh Quang Dũng">Trịnh Quang Dũng</option>
                    <option value="Trịnh Thị Hường">Trịnh Thị Hường</option>
                    <option value="Vũ Xuân Trường">Vũ Xuân Trường</option>
                </select>
            </div>
            <div class="filter-group">
                <label>📅 Từ:</label>
                <input type="date" id="fromDate" onchange="handleFilterChange()">
            </div>
            <div class="filter-group">
                <label>Đến:</label>
                <input type="date" id="toDate" onchange="handleFilterChange()">
            </div>
            <button class="btn btn-refresh" onclick="loadData()">🔄 Tải lại</button>
            <button class="btn btn-export" id="exportBtn" onclick="exportToExcel()">📥 Xuất Excel</button>
            <button class="btn btn-reset" onclick="resetFilters()">↩️ Đặt lại</button>
        </div>

        <div id="loading" style="text-align:center; padding: 20px;">Đang xử lý dữ liệu... ⏳</div>

        <table id="customerTable" style="display:none;">
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Loại đăng ký</th>
                    <th>Số tài khoản</th>
                    <th>Tên khách hàng</th>
                    <th>Cán bộ quản lý</th>
                    <th>Ngày đăng ký</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div id="pagination" class="pagination"></div>
    </div>

    <script>
        const AIRTABLE_CONFIG = {
            apiKey: 'patnWGs6JwKmhOfNX.23903394b7357442b9ed396470a06d3ad920a6727441fd312de9b62e55df8c91',
            baseId: 'appUPT733iVxTAc76',
            tableId: 'tblxjz7JExG5Aob2E'
        };
    
        let allRecords = [];
        let filteredRecords = [];
        let currentPage = 1;
        const pageSize = 50;
    
        // 1. Hàm thiết lập ngày mặc định (Từ đầu tháng đến hiện tại)
        function initDefaultDates() {
            const now = new Date();
            // Ngày đầu tháng: Năm hiện tại - Tháng hiện tại - 01
            const firstDay = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
            // Ngày hiện tại
            const today = now.toISOString().split('T')[0];
    
            document.getElementById('fromDate').value = firstDay;
            document.getElementById('toDate').value = today;
        }
    
        async function loadData() {
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            document.getElementById('customerTable').style.display = 'none';
            
            try {
                allRecords = [];
                let offset = null;
    
                do {
                    let url = `https://api.airtable.com/v0/${AIRTABLE_CONFIG.baseId}/${AIRTABLE_CONFIG.tableId}?view=Grid%20view`;
                    if (offset) url += `&offset=${offset}`;
    
                    const response = await fetch(url, {
                        headers: { 'Authorization': `Bearer ${AIRTABLE_CONFIG.apiKey}` }
                    });
                    const data = await response.json();
                    
                    // Kiểm tra nếu có bản ghi thì mới nối vào mảng
                    if (data.records) {
                        allRecords = allRecords.concat(data.records);
                    }
                    offset = data.offset;
                } while (offset);
    
                // 2. SỬA LỖI: Loại bỏ các bản ghi không hợp lệ trước khi xử lý
                allRecords = allRecords.filter(record => record && record.createdTime);
    
                // Sắp xếp mới nhất lên đầu
                allRecords.sort((a, b) => {
                    return new Date(b.createdTime) - new Date(a.createdTime);
                });
                
                document.getElementById('totalCount').textContent = allRecords.length;
                
                const todayStr = new Date().toDateString();
                document.getElementById('todayCount').textContent = allRecords.filter(r => 
                    r && r.createdTime && new Date(r.createdTime).toDateString() === todayStr
                ).length;
    
                handleFilterChange();
            } catch (err) {
                console.error("Chi tiết lỗi:", err);
                alert("Lỗi tải dữ liệu: " + err.message);
            } finally {
                loading.style.display = 'none';
            }
        }
    
        function handleFilterChange() {
            const staffValue = document.getElementById('staffFilter').value;
            const fromDate = document.getElementById('fromDate').value;
            const toDate = document.getElementById('toDate').value;
    
            // 3. SỬA LỖI: Thêm kiểm tra record tồn tại trong filter
            filteredRecords = allRecords.filter(record => {
                if (!record || !record.createdTime) return false;
    
                const fields = record.fields || {};
                const recordDate = new Date(record.createdTime);
                recordDate.setHours(0,0,0,0);
    
                const matchStaff = !staffValue || fields['Cán bộ quản lý'] === staffValue;
    
                let matchDate = true;
                if (fromDate) {
                    const dFrom = new Date(fromDate);
                    dFrom.setHours(0,0,0,0);
                    matchDate = matchDate && recordDate >= dFrom;
                }
                if (toDate) {
                    const dTo = new Date(toDate);
                    dTo.setHours(0,0,0,0);
                    matchDate = matchDate && recordDate <= dTo;
                }
    
                return matchStaff && matchDate;
            });
    
            document.getElementById('filteredCount').textContent = filteredRecords.length;
            currentPage = 1;
            renderTable();
        }
    
        function renderTable() {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filteredRecords.slice(start, end);
    
            if (pageData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 30px;">Không tìm thấy dữ liệu phù hợp</td></tr>';
            } else {
                pageData.forEach((record, index) => {
                    const f = record.fields || {};
                    tbody.innerHTML += `
                        <tr>
                            <td>${start + index + 1}</td>
                            <td>${Array.isArray(f['Loại đăng ký']) ? f['Loat đăng ký'].join(', ') : (f['Loại đăng ký'] || '')}</td>
                            <td>${f['Số tài khoản'] || ''}</td>
                            <td>${f['Tên khách hàng'] || ''}</td>
                            <td>${f['Cán bộ quản lý'] || ''}</td>
                            <td>${new Date(record.createdTime).toLocaleString('vi-VN')}</td>
                        </tr>
                    `;
                });
            }
    
            document.getElementById('customerTable').style.display = 'table';
            renderPagination();
        }
    
        function renderPagination() {
            const pagination = document.getElementById('pagination');
            pagination.innerHTML = '';
            const totalPages = Math.ceil(filteredRecords.length / pageSize);
    
            if (totalPages <= 1) return;
    
            pagination.innerHTML += `<button class="page-btn" onclick="changePage(1)" ${currentPage === 1 ? 'disabled' : ''}>«</button>`;
    
            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, startPage + 4);
            
            if (endPage - startPage < 4) startPage = Math.max(1, endPage - 4);
            
            for (let i = startPage; i <= endPage; i++) {
                pagination.innerHTML += `
                    <button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>
                `;
            }
    
            pagination.innerHTML += `<button class="page-btn" onclick="changePage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>»</button>`;
        }
    
        function changePage(page) {
            currentPage = page;
            renderTable();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    
        function resetFilters() {
            initDefaultDates(); // Đặt lại về đầu tháng
            document.getElementById('staffFilter').value = '';
            handleFilterChange();
        }
    
        function exportToExcel() {
            if (filteredRecords.length === 0) return alert("Không có dữ liệu để xuất!");
            
            const data = filteredRecords.map((r, i) => ({
                "STT": i + 1,
                "Loại đăng ký": Array.isArray(r.fields['Loại đăng ký']) ? r.fields['Loại đăng ký'].join(', ') : r.fields['Loại đăng ký'],
                "Số tài khoản": r.fields['Số tài khoản'],
                "Số điện thoại": r.fields['Số điện thoại'],
                "Tên khách hàng": r.fields['Tên khách hàng'],
                "Cán bộ quản lý": r.fields['Cán bộ quản lý'],
                "Ghi chú": r.fields['Ghi chú'],
                "Ngày đăng ký": new Date(r.createdTime).toLocaleString('vi-VN')
            }));
    
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Dữ liệu");
            XLSX.writeFile(wb, `DS_KhachHang_${document.getElementById('staffFilter').value || 'TongHop'}_${new Date().toISOString().split('T')[0]}.xlsx`);
        }
    
        // Khởi chạy
        initDefaultDates();
        loadData();
    </script>
</body>
</html>
